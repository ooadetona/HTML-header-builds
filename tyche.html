<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tyche</title>
    <link rel="stylesheet" href="./stylesheet2.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Caveat:wght@400..700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Oswald:wght@200..700&family=Roboto:ital@0;1&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header top">
        <div class="email">
            <img src="./assets/images/envelope_icon.png" alt="envelope icon">
            <p>flyshit@gmail.com</p>
        </div>
        <div class="search-bar">
            <input type="text" placeholder="Search ...">
            <button type="button"><img src="./assets/images/search_icon.png" alt="search icon"></button>
        </div>
    </header>
    <header class="header mid">
        <div>
            <img src="./assets/images/shopping_bag_icon.png" alt="tychee logo">
            <p>Tyche</p>
        </div>
        <nav>
            <li><a href="">HOME</a></li>
            <li><a href="">SHOP</a></li>
            <li><a href="">BLOG</a></li>
            <li><a href="">CONTACT</a></li>
        </nav>
    </header>
    <header class="header bottom">
        <div class="ada">
            <img src="./assets/images/globe_icon.png" alt="world shipping">
            <div>
                <p>FREE SHIPPING</p>
                <small>On all orders over $90</small>
            </div>
        </div>
        <div class="ada">
            <img src="./assets/images/telephone_icon.png" alt="contact us">
            <div>
                <p>CALL US ANYTIME</p>
                <small>+04786445953</small>
            </div>
        </div>
        <div class="ada">
            <img src="./assets/images/pin_icon.png" alt="our location">
            <div>
                <p>OUR LOCATION</p>
                <small>557-6308 Lacinia Road, NYC</small>
            </div>
        </div>
    </header>
</body>
</html>
